<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Market Prices Test</title>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b0b0f;
            color: #fff;
            padding: 20px;
        }

        .price-ticker {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 0;
        }

        .ticker-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 16px;
        }

        .ticker-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .ticker-title {
            font-size: 12px;
            color: #71717a;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
        }

        .status-dot.connecting {
            background: #eab308;
        }

        .status-dot.disconnected {
            background: #ef4444;
        }

        .prices-grid {
            display: flex;
            gap: 24px;
            align-items: center;
            flex-wrap: wrap;
        }

        .price-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .instrument-name {
            font-size: 12px;
            color: #a1a1aa;
            font-weight: 500;
            min-width: 60px;
        }

        .price-value {
            font-size: 14px;
            color: #fff;
            font-family: 'SF Mono', Monaco, monospace;
            font-weight: 600;
            min-width: 50px;
            text-align: right;
        }

        .price-change {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .change-icon {
            width: 12px;
            height: 12px;
        }

        .change-value {
            font-size: 12px;
            font-weight: 500;
            min-width: 35px;
            text-align: right;
        }

        .change-positive {
            color: #4ade80;
        }

        .change-negative {
            color: #f87171;
        }

        .change-neutral {
            color: #71717a;
        }

        .status-text {
            font-size: 12px;
            color: #71717a;
            text-transform: capitalize;
        }

        .loading {
            color: #71717a;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="price-ticker">
        <div class="ticker-container">
            <div class="ticker-header">
                <div class="status-dot" id="statusDot"></div>
                <span class="ticker-title">Live Markets</span>
                <span class="status-text" id="statusText">connecting</span>
            </div>
            <div class="prices-grid" id="pricesGrid">
                <div class="loading">Connecting to price feed...</div>
            </div>
        </div>
    </div>

    <script>
        const socket = io('http://localhost:4001', {
            transports: ['websocket', 'polling']
        });

        const prices = {
            'NIFTY 50': null,
            'NIFTY BANK': null,
            'SENSEX': null,
            'INDIA VIX': null,
            'USD-INR': null
        };

        const instruments = [
            { name: 'NIFTY 50', short: 'NIFTY' },
            { name: 'NIFTY BANK', short: 'BANK' },
            { name: 'SENSEX', short: 'SENSEX' },
            { name: 'INDIA VIX', short: 'VIX' },
            { name: 'USD-INR', short: 'USD/INR' }
        ];

        function updateStatus(status) {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            
            statusDot.className = `status-dot ${status}`;
            statusText.textContent = status;
        }

        function formatPrice(price) {
            if (price === null) return '--';
            return price.toFixed(2);
        }

        function getChangeColor(change) {
            if (!change) return 'change-neutral';
            if (change.value > 0) return 'change-positive';
            if (change.value < 0) return 'change-negative';
            return 'change-neutral';
        }

        function getChangeIcon(change) {
            if (!change) return '';
            if (change.value > 0) return '▲';
            if (change.value < 0) return '▼';
            return '';
        }

        function renderPrices() {
            const pricesGrid = document.getElementById('pricesGrid');
            
            const html = instruments.map(instrument => {
                const priceData = prices[instrument.name];
                const changeColor = getChangeColor(priceData?.change || null);
                const changeIcon = getChangeIcon(priceData?.change || null);

                return `
                    <div class="price-item">
                        <span class="instrument-name">${instrument.short}</span>
                        <span class="price-value">${formatPrice(priceData?.price || null)}</span>
                        ${priceData?.change ? `
                            <div class="price-change">
                                <span class="change-icon ${changeColor}">${changeIcon}</span>
                                <span class="change-value ${changeColor}">
                                    ${priceData.change.value > 0 ? '+' : ''}${priceData.change.percentage.toFixed(2)}%
                                </span>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');

            pricesGrid.innerHTML = html;
        }

        socket.on('connect', () => {
            console.log('Connected to price server');
            updateStatus('connected');
        });

        socket.on('disconnect', () => {
            console.log('Disconnected from price server');
            updateStatus('disconnected');
        });

        socket.on('price_update', (data) => {
            console.log('Price update:', data);
            prices[data.instrument] = {
                price: data.price,
                timestamp: data.timestamp,
                change: data.change
            };
            renderPrices();
        });

        // Fetch initial prices
        async function fetchInitialPrices() {
            try {
                const response = await fetch('http://localhost:4001/api/v1/market/prices');
                const data = await response.json();
                if (data.success) {
                    Object.keys(data.data.prices).forEach(instrument => {
                        prices[instrument] = data.data.prices[instrument];
                    });
                    renderPrices();
                }
            } catch (error) {
                console.error('Failed to fetch initial prices:', error);
            }
        }

        // Initial setup
        updateStatus('connecting');
        fetchInitialPrices();
    </script>
</body>
</html>
